<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Holtbyfest RSVP</title>

    <link rel="stylesheet" href="style.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Great+Vibes&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <main class="page">
      <section class="card" id="formCard">
        <p class="script">You’re Invited to</p>
        <h1>HOLTBYFEST</h1>
        <p class="tagline">Choosin’ Texas with us!</p>

        <form id="rsvpForm">
          <label>
            Full Name
            <input type="text" name="name" required />
          </label>

          <label>
            Will you be attending?
            <select name="attending" id="attendingSelect" required>
              <option value="">Select one</option>
              <option value="Yes">Saddlin' Up! (Yes)</option>
              <option value="No">Can't Make the Ride (No)</option>
            </select>
          </label>

          <p id="declineMessage" class="decline-message hidden">
            Sorry you can’t make it 😢 You’ll be missed!
          </p>

          <label id="guestSection" class="hidden">
            Bringing a guest?
            <select name="guest" id="guestSelect">
              <option value="">Select one</option>
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </label>

          <label id="guestNameField" class="hidden">
            Guest Name
            <input type="text" name="guestName" />
          </label>

          <label id="questionsSection" class="hidden">
            Questions?
            <textarea name="questions"></textarea>
          </label>

          <button type="submit">Submit RSVP</button>
          <p id="formMessage" class="form-message"></p>
        </form>
      </section>
      <p id="successMessage"></p>
    </main>

    <script src="script.js"></script>
  </body>
</html>
